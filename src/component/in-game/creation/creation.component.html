<div class="creation-page">
  <p-tabView
    [(activeIndex)]="activeIndex"
    class="creation-tabs"
    (onChange)="onTabChange()"
  >
    <p-tabPanel header="Classes">
      <app-origine (openMetier)="openMetiers($event)"></app-origine>
    </p-tabPanel>
    <p-tabPanel header="Metiers">
      <app-metier [origineName]="origineName"></app-metier>
    </p-tabPanel>
  </p-tabView>
</div>
