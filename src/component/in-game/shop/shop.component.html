<div class="shop-page">
  <p-panel class="shop-filters-card" [toggleable]="true">
    <ng-template pTemplate="header">
      <div class="filters-title">
        <i class="pi pi-sliders-h"></i>
        <span>Paramètres du marché</span>
      </div>
    </ng-template>

    <div class="select-container">
      <div class="filter-field">
        <label for="villeType">Taille de ville</label>
        <select id="villeType" (change)="onChangedVille($event)">
          <option value="" disabled selected>
            Choisissez une taille de ville...
          </option>
          <option *ngFor="let ville of villes" [value]="ville.type">
            {{ ville.libelle }}
          </option>
        </select>
      </div>

      <div class="filter-field">
        <label for="region">Région</label>
        <select id="region" (change)="onChangedRegion($event)">
          <option value="" disabled selected>Choisissez une région...</option>
          <option *ngFor="let type of zones" [value]="type.code">
            {{ type.libelle }}
          </option>
        </select>
      </div>
    </div>
    <div class="shop-categories">
      <div class="categories-grid">
        <div
          class="category-switch"
          *ngFor="let category of categorieSelectable"
        >
          <span>{{ category.libelle }}</span
          ><p-inputSwitch
            [(ngModel)]="categoryStates[category.code]"
            (onChange)="onCategoryToggle()"
          />
        </div>
      </div>
    </div>
  </p-panel>
  <div class="desktop-view">
    <p-tabView class="custom-tabs shop-tabs" (onChange)="onTabChange($event)">
      <p-tabPanel header="Armes">
        <app-shop-arme
          [selectedVilleType]="selectedVilleType"
          [selectedRegion]="selectedZone"
          [activeCategorieCodes]="activeCategorieCodes"
        >
        </app-shop-arme>
      </p-tabPanel>

      <p-tabPanel header="Armures">
        <app-shop-armure
          [selectedVilleType]="selectedVilleType"
          [selectedRegion]="selectedZone"
          [activeCategorieCodes]="activeCategorieCodes"
        >
        </app-shop-armure>
      </p-tabPanel>

      <p-tabPanel header="Accessoire">
        <app-shop-accessoire
          [selectedVilleType]="selectedVilleType"
          [activeCategorieCodes]="activeCategorieCodes"
        ></app-shop-accessoire>
      </p-tabPanel>

      <p-tabPanel header="Potions">
        <app-shop-potion
          [selectedVilleType]="selectedVilleType"
          [activeCategorieCodes]="activeCategorieCodes"
        ></app-shop-potion>
      </p-tabPanel>

      <p-tabPanel header="Gemmes">
        <app-shop-gemme
          [selectedVilleType]="selectedVilleType"
        ></app-shop-gemme>
      </p-tabPanel>
    </p-tabView>
  </div>

  <div class="mobile-view">
    <p-tabView class="custom-tabs shop-tabs" (onChange)="onTabChange($event)">
      <p-tabPanel>
        <ng-template pTemplate="header">
          <span class="flex align-items-center gap-2">
            <img src="assets/icons/arme.svg" width="16" height="16" />
          </span>
        </ng-template>
        <app-shop-arme
          [selectedVilleType]="selectedVilleType"
          [selectedRegion]="selectedZone"
          [activeCategorieCodes]="activeCategorieCodes"
        >
        </app-shop-arme>
      </p-tabPanel>

      <p-tabPanel>
        <ng-template pTemplate="header">
          <span class="flex align-items-center gap-2">
            <img src="assets/icons/armure.svg" width="16" height="16" />
          </span>
        </ng-template>
        <app-shop-armure
          [selectedVilleType]="selectedVilleType"
          [selectedRegion]="selectedZone"
          [activeCategorieCodes]="activeCategorieCodes"
        >
        </app-shop-armure>
      </p-tabPanel>

      <p-tabPanel>
        <ng-template pTemplate="header">
          <span class="flex align-items-center gap-2">
            <img src="assets/icons/accessoire.svg" width="16" height="16" />
          </span>
        </ng-template>
        <app-shop-accessoire
          [selectedVilleType]="selectedVilleType"
          [activeCategorieCodes]="activeCategorieCodes"
        ></app-shop-accessoire>
      </p-tabPanel>

      <p-tabPanel>
        <ng-template pTemplate="header">
          <span class="flex align-items-center gap-2">
            <img src="assets/icons/potion.svg" width="16" height="16" />
          </span>
        </ng-template>
        <app-shop-potion
          [selectedVilleType]="selectedVilleType"
          [activeCategorieCodes]="activeCategorieCodes"
        ></app-shop-potion>
      </p-tabPanel>

      <p-tabPanel>
        <ng-template pTemplate="header">
          <span class="flex align-items-center gap-2">
            <img src="assets/icons/gemme.svg" width="16" height="16" />
          </span>
        </ng-template>
        <app-shop-gemme
          [selectedVilleType]="selectedVilleType"
        ></app-shop-gemme>
      </p-tabPanel>
    </p-tabView>
  </div>
</div>
