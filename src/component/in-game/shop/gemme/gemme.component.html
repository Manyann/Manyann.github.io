<p-table
  [value]="items"
  [scrollable]="true"
  styleClass="mt-3 boutique-table-gemmes"
>
  <ng-template pTemplate="header">
    <tr>
      <th>Nom</th>
      <th pSortableColumn="prix">Prix</th>
      <th>Informations</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.libelle }}</td>
      <td class="td-prix">{{ item.prix }}</td>
      <td class="td-infos">{{ item.informations }}</td>
    </tr>
  </ng-template>
</p-table>
