<p-table
  [value]="items"
  [scrollable]="true"
  dataKey="categorie.code"
  rowGroupMode="subheader"
  groupRowsBy="categorie.code"
  [tableStyle]="{ 'min-width': '70rem' }"
  styleClass="mt-3 p-datatable-striped boutique-table"
>
  <ng-template pTemplate="header">
    <tr>
      <th pFrozenColumn>Nom</th>
      <th pFrozenColumn>Prix</th>
      <th>Dégats</th>
      <th>AT / PRD</th>
      <th>RUP</th>
      <th>COU</th>
      <th>INT</th>
      <th>CHA</th>
      <th>AD</th>
      <th>FO</th>
      <th>CHN</th>
      <th>Informations</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="groupheader" let-item let-expanded="expanded">
    <tr class="group-header">
      <td colspan="100%">
        <div>{{ item.categorie.libelle }}</div>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td pFrozenColumn>
        {{ item.libelle }} <span [innerHTML]="item.origine | origine"></span>
      </td>
      <td
  pFrozenColumn
  class="td-price"
  [innerHTML]="item.prix | originePrix : item.origine | promotion">
</td>
      <td [innerHTML]="item.degats | bonusDegat: item.origine"></td>
      <td>
        <span [innerHTML]="item.attaque | bonusAttaque: item.origine"></span>/
        {{ item.parade }}
      </td>
      <td>{{ item.rupture }}</td>
      <td>{{ item.courage }}</td>
      <td>{{ item.intelligence }}</td>
      <td>{{ item.charisme }}</td>
      <td [innerHTML]="item.adresse | bonusAd: item.origine"></td>
      <td [innerHTML]="item.force | bonusForce: item.origine"></td>
      <td>{{ item.chance }}</td>
      <td [innerHTML]="item.informations | bonusInfo: item.origine"></td>
    </tr>
  </ng-template>
</p-table>
