<div class="parts">
  <div class="title">Compétences {{ type }}</div>
  <div class="list-item-details-items">
    <span *ngFor="let competenceFiltered of competencesFiltered">
      @if (!competenceFiltered.startsWith("#")) {
        {{ competenceFiltered }}
      } @else {
        <a href="competences/{{ competenceFiltered }}" target="_blank"
          >Voir les compétences spéciales</a
        >
      }
    </span>
  </div>
</div>
